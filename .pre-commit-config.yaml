repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
  - repo: local
    hooks:
      - id: docs-with-feature
        name: tool/route surface changes must update docs
        entry: scripts/check_docs_with_features.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
